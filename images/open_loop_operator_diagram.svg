<svg width="680" height="460" viewBox="0 0 680 460" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Signal processor block diagram with operator</title>
  <desc>Block diagram where a human operator tweaks knobs on the processor block and looks at the display below</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Processor dashed container -->
  <rect x="200" y="40" width="300" height="80" rx="8" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="6 4"/>
  <text font-family="sans-serif" font-size="12" x="350" y="32" text-anchor="middle" fill="#888">Processor</text>

  <!-- Delay elements inside processor -->
  <rect x="220" y="58" width="44" height="40" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="242" y="82" text-anchor="middle" dominant-baseline="central" fill="#3C3489">∅</text>

  <rect x="278" y="58" width="44" height="40" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="300" y="82" text-anchor="middle" dominant-baseline="central" fill="#3C3489">∅</text>

  <text font-family="sans-serif" font-size="14" font-weight="500" x="344" y="82" text-anchor="middle" dominant-baseline="central" fill="#3C3489">···</text>

  <rect x="368" y="58" width="44" height="40" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="390" y="82" text-anchor="middle" dominant-baseline="central" fill="#3C3489">∅</text>

  <!-- Connectors between delay elements -->
  <line x1="264" y1="78" x2="278" y2="78" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="322" y1="78" x2="336" y2="78" stroke="#888" stroke-width="1"/>
  <line x1="354" y1="78" x2="368" y2="78" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Input signal arrow -->
  <line x1="60" y1="78" x2="218" y2="78" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" x="34" y="73" text-anchor="middle" fill="#888">Input</text>
  <text font-family="sans-serif" font-size="12" x="34" y="87" text-anchor="middle" fill="#888">signal</text>

  <!-- Output signal arrow -->
  <line x1="412" y1="78" x2="590" y2="78" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" x="622" y="73" text-anchor="middle" fill="#888">Output</text>
  <text font-family="sans-serif" font-size="12" x="622" y="87" text-anchor="middle" fill="#888">signal</text>

  <!-- Signal processor box -->
  <rect x="50" y="230" width="150" height="50" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="125" y="259" text-anchor="middle" dominant-baseline="central" fill="#085041">Signal processor</text>

  <!-- Other data arrow -->
  <line x1="14" y1="255" x2="48" y2="255" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" x="10" y="248" text-anchor="middle" fill="#888">Other</text>
  <text font-family="sans-serif" font-size="12" x="10" y="262" text-anchor="middle" fill="#888">data</text>

  <!-- Display box -->
  <rect x="50" y="340" width="150" height="50" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="125" y="369" text-anchor="middle" dominant-baseline="central" fill="#444441">Display</text>

  <!-- Signal processor -> Display -->
  <line x1="125" y1="280" x2="125" y2="338" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Input line branch down to signal processor -->
  <line x1="125" y1="78" x2="125" y2="228" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Human figure -->
  <circle cx="460" cy="158" r="20" fill="none" stroke="#888" stroke-width="1.5"/>
  <circle cx="452" cy="155" r="2.5" fill="#888"/>
  <!-- Gaze line toward display -->
  <line x1="450" y1="156" x2="210" y2="355" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Body -->
  <line x1="460" y1="178" x2="460" y2="260" stroke="#888" stroke-width="1.5"/>

  <!-- Left arm reaching to knob -->
  <line x1="460" y1="200" x2="396" y2="130" stroke="#888" stroke-width="1.5"/>
  <circle cx="394" cy="128" r="4" fill="none" stroke="#888" stroke-width="1.5"/>

  <!-- Knob on processor -->
  <circle cx="394" cy="58" r="5" fill="none" stroke="#888" stroke-width="1.2"/>
  <line x1="394" y1="53" x2="394" y2="58" stroke="#888" stroke-width="1.2"/>
  <!-- Dashed line from hand to knob -->
  <line x1="394" y1="132" x2="394" y2="63" stroke="#888" stroke-width="1" stroke-dasharray="3 2" opacity="0.6"/>

  <!-- Right arm -->
  <line x1="460" y1="200" x2="490" y2="240" stroke="#888" stroke-width="1.5"/>

  <!-- Legs -->
  <line x1="460" y1="260" x2="438" y2="320" stroke="#888" stroke-width="1.5"/>
  <line x1="460" y1="260" x2="482" y2="320" stroke="#888" stroke-width="1.5"/>
</svg>
